name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Fix Gemini model (gemini-1.5-flash -> gemini-2.0-flash)
        run: |
          sed -i "s/gemini-1\.5-flash/gemini-2.0-flash/g" src/services/gemini.service.ts
          echo "Model updated:"
          grep -n "gemini" src/services/gemini.service.ts | head -10

      - name: Generate environment.prod.ts
        run: |
          mkdir -p src/environments
          node -e "
          const fs = require('fs');
          const e = process.env;
          const content = [
            'export const environment = {',
            '  production: true,',
            '  geminiApiKey: \"' + (e.VITE_GEMINI_API_KEY||'') + '\",',
            '  firebase: {',
            '    apiKey: \"' + (e.VITE_FIREBASE_API_KEY||'demo-key') + '\",',
            '    authDomain: \"' + (e.VITE_FIREBASE_AUTH_DOMAIN||'demo.firebaseapp.com') + '\",',
            '    databaseURL: \"' + (e.VITE_FIREBASE_DATABASE_URL||'https://demo-rtdb.firebaseio.com') + '\",',
            '    projectId: \"' + (e.VITE_FIREBASE_PROJECT_ID||'demo-project') + '\",',
            '    storageBucket: \"' + (e.VITE_FIREBASE_STORAGE_BUCKET||'demo.appspot.com') + '\",',
            '    messagingSenderId: \"' + (e.VITE_FIREBASE_MESSAGING_SENDER_ID||'123456789') + '\",',
            '    appId: \"' + (e.VITE_FIREBASE_APP_ID||'1:123:web:abc') + '\"',
            '  }',
            '};'
          ].join('\\n');
          fs.mkdirSync('src/environments', {recursive:true});
          fs.writeFileSync('src/environments/environment.prod.ts', content);
          console.log('Generated environment.prod.ts OK');
          console.log(content);
          "
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build (Angular CLI)
        run: ng build --configuration production

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/asset-guard-advanced/

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
