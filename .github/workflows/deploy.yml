name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Generate environment.prod.ts
        run: |
          mkdir -p src/environments
          python3 - <<PYEOF
          import os
          content = f"""export const environment = {{
            production: true,
            geminiApiKey: '{os.environ.get('VITE_GEMINI_API_KEY', '')}',
            firebase: {{
              apiKey: '{os.environ.get('VITE_FIREBASE_API_KEY', 'demo-key')}',
              authDomain: '{os.environ.get('VITE_FIREBASE_AUTH_DOMAIN', 'demo.firebaseapp.com')}',
              databaseURL: '{os.environ.get('VITE_FIREBASE_DATABASE_URL', 'https://demo-rtdb.firebaseio.com')}',
              projectId: '{os.environ.get('VITE_FIREBASE_PROJECT_ID', 'demo-project')}',
              storageBucket: '{os.environ.get('VITE_FIREBASE_STORAGE_BUCKET', 'demo.appspot.com')}',
              messagingSenderId: '{os.environ.get('VITE_FIREBASE_MESSAGING_SENDER_ID', '123456789')}',
              appId: '{os.environ.get('VITE_FIREBASE_APP_ID', '1:123:web:abc')}'
            }}
          }};
          """
          with open('src/environments/environment.prod.ts', 'w') as f:
              f.write(content)
          print('environment.prod.ts generated OK')
          PYEOF
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build (Angular CLI)
        run: ng build --configuration production

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/asset-guard-advanced/

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
