<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AssetGuard Corporate Edition Advanced</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafrex/spa-github-pages
    // This script checks to see if a redirect is present in the query string
    // and converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which will cause the browser to stay on the current page without refreshing
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&') 
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <script type="text/javascript">
    // Redirect to index.html with the current path as a query param
    window.location.pathname = '/ASSET-GUARD-Corporate-Edition-Advanced/index.html';
  </script>
</head>
<body>
</body>
</html>
